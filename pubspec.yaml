name: wajbati_dz
description: Wajbati DZ - Food Delivery App for Algeria

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.1.0
  provider: ^6.1.5+1
  http: ^1.3.0
  intl: ^0.19.0
  logger: ^2.5.0
  url_launcher: ^6.1.12
  lottie: ^3.3.1
  connectivity_plus: ^5.0.1
  cupertino_icons: ^1.0.8
  iconsax: ^0.0.8
  smooth_page_indicator: ^1.2.1
  flutter_native_splash: ^2.4.6
  cached_network_image: ^3.4.1
  image_picker: ^1.0.4
  video_player: ^2.8.2

  flutter_riverpod: ^2.4.0
  get: ^4.6.5
  get_storage: ^2.1.1
  appwrite: ^23.0.0
  visibility_detector: ^0.4.0+2
  flutter_local_notifications: ^19.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/logos/
    - assets/photos/
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logos/logow.jpg"
  min_sdk_android: 21

flutter_native_splash:
  color: "#ffffff"
  image: assets/logos/logow.jpg
  android_12:
    image: assets/logos/logow.jpg
